# mood_to_meal_butler/config_schema.yaml
# PHASE 4: Configuration System for Extensibility
# Developers can customize emotions, meals, recommendations via YAML

# SECTION 1: EMOTION CONFIGURATION
# Easy to add new emotions without code changes

emotions:
  
  sadness:
    keywords: [sad, down, depressed, upset, unhappy, blue, heartbroken]
    emoji: "💙"
    greeting: "I hear you... that's tough. Let me suggest comfort foods."
    meal_filters: [comfort, warmth, mood-booster]
    response_style: empathetic
    temperature: warm
  
  exhaustion:
    keywords: [tired, exhausted, fatigue, sleepy, drained, worn-out, weary]
    emoji: "😴"
    greeting: "You sound exhausted. Here are restorative foods."
    meal_filters: [energy-boost, recovery, rejuvenation]
    response_style: supportive
    temperature: warm
  
  joy:
    keywords: [happy, excited, celebrating, thrilled, delighted, ecstatic]
    emoji: "🎉"
    greeting: "That's wonderful! Let me suggest celebration meals!"
    meal_filters: [celebration, indulgent, special]
    response_style: enthusiastic
    temperature: any
  
  stress:
    keywords: [stressed, anxious, nervous, worried, tense, pressured]
    emoji: "😰"
    greeting: "Take a breath. Here are calming foods."
